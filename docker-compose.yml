services:
  jukebox:
    build:
      context: .
    container_name: marshallcloud-jukebox
    restart: unless-stopped
    ports:
      - "3080:3000"
    environment:
      PORT: "3000"
      PUBLIC_URL: "https://jukebox.marshallcloud.net"
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET}"
      SPOTIFY_REDIRECT_URI: "https://jukebox.marshallcloud.net/auth/callback"
      HA_URL: "${HA_URL:-}"
      HA_TOKEN: "${HA_TOKEN:-}"
      HA_MEDIA_PLAYER: "${HA_MEDIA_PLAYER:-media_player.connect}"
      ADMIN_PIN: "${ADMIN_PIN}"
      SESSION_SECRET: "${SESSION_SECRET}"
    volumes:
      - jukebox_data:/app/data

volumes:
  jukebox_data:
