<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b0d10"><title>Relay Host Controls</title><link rel="stylesheet" href="/styles.css?v=0.8.1"><link rel="stylesheet" href="/admin.css?v=0.8.1"></head><body><main class="admin-shell"><header class="admin-header"><div><p class="eyebrow">RELAY</p><h1>Host controls</h1></div><a class="button ghost" href="/">Guest view</a></header><section id="loginPanel" class="admin-card"><p class="eyebrow">HOST ACCESS</p><h2>Enter your PIN</h2><form id="loginForm" class="pin-form"><input id="pin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="Admin PIN" required><button class="button primary">Unlock</button></form><p id="loginMessage" class="helper"></p></section><section id="controls" class="hidden admin-controls"><div class="admin-card now-admin"><img id="adminArt" alt=""><div><p class="eyebrow">NOW PLAYING</p><h2 id="adminTitle">Loading…</h2><p id="adminArtist" class="muted"></p></div></div><div class="control-grid admin-playback-controls"><button data-action="play" class="control-button">▶ Play</button><button data-action="pause" class="control-button">Ⅱ Pause</button><button data-action="next" class="control-button">⏭ Skip</button></div><section class="admin-card"><div class="setting-row"><div><h3>Volume</h3><p class="muted">Controls the Sonos zone.</p></div><strong id="volumeLabel">0%</strong></div><input id="volume" class="volume-slider" type="range" min="0" max="100" value="0"></section><section class="admin-card"><div class="setting-row"><div><h3>Guest requests</h3><p id="lockCopy" class="muted request-state-copy">Requests are open.</p></div><button id="lockButton" class="button danger">Lock requests</button></div></section><section class="admin-card"><div class="admin-queue-header"><div><p class="eyebrow">UP NEXT</p><h3>Live queue</h3></div><span id="adminQueueCount" class="muted">0 songs</span></div><div id="adminQueue" class="admin-queue"><p class="muted">Loading queue…</p></div></section><section class="admin-card guest-access-card"><p class="eyebrow">GUEST ACCESS</p><h3>jukebox.marshallcloud.net</h3><p class="muted">Use this address for the QR code sign.</p></section><p id="adminMessage" class="helper"></p></section></main><script src="/admin.js?v=0.8.1"></script></body></html>
